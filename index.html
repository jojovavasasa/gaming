<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <title>butnogames</title>  
    <style>  
        body {  
            background-color: black;  
            font-family: Arial, sans-serif;  
            color: white;  
        }  
    </style>  
</head>  

<body>
<h1>Welcome to My Page</h1>

<div id="games"><p>Loading games...</p></div>
<script>
  async function loadGames() {
    const container = document.getElementById("games");
    try {
      const res = await fetch("/api/games");
      const games = await res.json();
      container.innerHTML = games.map(g => `
        <p><a href="${g.playPath}" target="_blank" rel="noopener noreferrer">Play "${g.name}"</a></p>
        <p><sub>by <a href="${g.repoUrl}" target="_blank" rel="noopener noreferrer">${g.author}</a>${g.description ? " — " + g.description : ""}</sub></p>
      `).join("");
    } catch (e) {
      container.innerHTML = "<p>Failed to load games.</p>";
    }
  }
  loadGames();
</script>

</footer>
